name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-notes:
    name: Release notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${GITHUB_REF_NAME}"
            title="Changes since ${previous_tag}"
          else
            range="${GITHUB_REF_NAME}"
            title="Initial release"
          fi

          {
            echo "body<<EOF"
            echo "## ${title}"
            echo
            git log --pretty=format:'- %s (%h)' "$range"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-14
            target: x86_64-apple-darwin
            formats: app,dmg
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            formats: app,dmg
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb,rpm,pacman
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis,wix

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-x11-dev rpm patchelf libfuse2 desktop-file-utils

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: cargo packager --release --target ${{ matrix.target }} --formats ${{ matrix.formats }}

      - name: Upload package artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Palimpsest ${{ github.ref_name }}
          body: ${{ needs.release-notes.outputs.body }}
          files: |
            dist/**
          fail_on_unmatched_files: false
