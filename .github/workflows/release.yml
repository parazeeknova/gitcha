name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  should-release:
    name: Should release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'skipped' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/p' Cargo.toml | head -1)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: github.event_name != 'push'
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists, skipping creation"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

  release-notes:
    name: Release notes
    needs: should-release
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.should-release.outputs.tag }}

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${{ needs.should-release.outputs.tag }}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${{ needs.should-release.outputs.tag }}"
            title="Changes since ${previous_tag}"
          else
            range="${{ needs.should-release.outputs.tag }}"
            title="Initial release"
          fi

          {
            echo "body<<EOF"
            echo "## ${title}"
            echo
            git log --pretty=format:'- %s (%h)' "$range"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify (Lint, Format, Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-x11-dev

      - name: Format Check
        run: cargo fmt --all --check

      - name: Type Check
        run: cargo check --all-targets --all-features

      - name: Clippy Lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Cargo Test
        run: cargo test

  build:
    name: Build ${{ matrix.name }}
    needs: [release-notes, should-release, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-14
            target: x86_64-apple-darwin
            formats: app,dmg
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            formats: app,dmg
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb,pacman
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis,wix

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-x11-dev rpm patchelf libfuse2 desktop-file-utils

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: cargo packager --release --target ${{ matrix.target }} --formats ${{ matrix.formats }}

      - name: Upload package artifacts
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.should-release.outputs.tag }}
          name: gitcha ${{ needs.should-release.outputs.tag }}
          body: ${{ needs.release-notes.outputs.body }}
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/*.dmg
            dist/*.exe
            dist/*.msi
            dist/PKGBUILD
          fail_on_unmatched_files: false

  update-pkgbuild:
    name: Update PKGBUILD version
    needs: [should-release, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update PKGBUILD and README version
        shell: bash
        run: |
          version="${{ needs.should-release.outputs.version }}"
          tarball_url="https://github.com/parazeeknova/gitcha/releases/download/v${version}/gitcha_${version}_x86_64.tar.gz"
          sha="$(curl -sL "$tarball_url" | sha256sum | awk '{print $1}')"
          sed -i "s/^pkgver=.*/pkgver=${version}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${sha}')/" PKGBUILD
          sed -i "s/v0\.1\.70/v${version}/g" .github/README.md
          sed -i "s/0\.1\.70/${version}/g" .github/README.md

      - name: Commit PKGBUILD
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --cached --quiet || git commit -m "chore: update PKGBUILD to v${{ needs.should-release.outputs.version }}"
          git push
