name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-fmt:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    # Skip if merging from dev to main (PR target is main and head is dev, or push to main)
    if: |
      !(github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'dev') &&
      !(github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-x11-dev

      - name: Format Check
        run: cargo fmt --all --check

      - name: Type Check
        run: cargo check --all-targets --all-features

      - name: Clippy Lints
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-x11-dev

      - name: Run Cargo Test
        run: cargo test
